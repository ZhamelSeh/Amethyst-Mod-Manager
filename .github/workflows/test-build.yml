name: Test Build

# Manual test builds of the AppImage / Flatpak without publishing a
# release. Artifacts land on the workflow run page — download from there.
on:
  workflow_dispatch:
    inputs:
      target:
        description: What to build
        type: choice
        options:
          - both
          - appimage
          - flatpak
        default: both
      flatpak_channel:
        description: >-
          OSTree branch the flatpak bundle tracks. Defaults to beta — a
          dispatch run has no version tag, so without this it would land on
          stable and the installed bundle would then follow the stable channel.
        type: choice
        options:
          - beta
          - stable
        default: beta

jobs:
  build:
    name: Build
    uses: ./.github/workflows/build.yml
    # Sign flatpak export commits so the bundle's embedded --gpg-keys verifies.
    secrets: inherit
    with:
      build_appimage: ${{ inputs.target != 'flatpak' }}
      build_flatpak: ${{ inputs.target != 'appimage' }}
      flatpak_channel: ${{ inputs.flatpak_channel }}
